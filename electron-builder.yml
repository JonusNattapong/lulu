appId: com.luluai.desktop
productName: Lulu
directories:
  output: release
  buildResources: desktop
files:
  - dist/**/*
  - dashboard/dist/**/*
  - desktop/**/*
  - "!desktop/**/*.cjs"
  - "!desktop/node_modules/**/*"
extraResources:
  - from: desktop
    to: desktop
    filter:
      - "icon.png"
      - "icon.ico"
extraMetadata:
  main: desktop/main.cjs
asar: true
npmRebuild: false
win:
  target:
    - nsis
  icon: desktop/icon.ico
mac:
  target:
    - dmg
  icon: desktop/icon.png
  category: public.app-category.productivity
linux:
  target:
    - AppImage
  icon: desktop/icon.png
  category: Utility
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
publish:
  provider: github
  owner: JonusNattapong
  repo: lulu
