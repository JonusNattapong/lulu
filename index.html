<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lulu AI Docs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e17;
      --sidebar-bg: #0d1321;
      --surface: #131a2b;
      --surface-hover: #1a2540;
      --border: #1e2d4a;
      --text: #e1e8f0;
      --muted: #6b7fa3;
      --accent: #5b9cf6;
      --accent-dim: #3d7dd4;
      --green: #3fb950;
      --amber: #e3b341;
      --purple: #bc8cff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      line-height: 1.65;
      min-height: 100vh;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      min-height: 100vh;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 0;
      left: 0;
      overflow-y: auto;
      padding: 1.5rem 0;
      z-index: 100;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
    }

    .sidebar-logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent) 0%, #7b6fff 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .sidebar-brand {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .sidebar-version {
      font-size: 0.7rem;
      color: var(--green);
      background: rgba(63, 185, 80, 0.1);
      border: 1px solid rgba(63, 185, 80, 0.3);
      padding: 2px 7px;
      border-radius: 10px;
    }

    .sidebar-section {
      margin-bottom: 1.5rem;
    }

    .sidebar-section-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 0 1.25rem;
      margin-bottom: 0.4rem;
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 1.25rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.12s;
      border-left: 2px solid transparent;
    }

    .sidebar-link:hover {
      color: var(--text);
      background: var(--surface-hover);
    }

    .sidebar-link.active {
      color: var(--accent);
      background: rgba(91, 156, 246, 0.08);
      border-left-color: var(--accent);
    }

    .sidebar-link .icon {
      font-size: 1rem;
      width: 20px;
      text-align: center;
    }

    /* Main content */
    .main {
      flex: 1;
      margin-left: 260px;
      min-height: 100vh;
    }

    .content-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 2.5rem 3rem;
    }

    /* Content styling */
    #content h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: #fff;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }

    #content h2 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 2.5rem 0 1rem;
      color: #fff;
      letter-spacing: -0.02em;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    #content h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 1.8rem 0 0.6rem;
      color: #d0daf0;
    }

    #content h4 {
      font-size: 0.95rem;
      font-weight: 600;
      margin: 1.4rem 0 0.5rem;
      color: #d0daf0;
    }

    #content p { margin: 0.85rem 0; }

    #content a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.12s;
    }

    #content a:hover {
      border-bottom-color: var(--accent);
    }

    #content code {
      background: rgba(91, 156, 246, 0.08);
      color: #8ec8ff;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      border: 1px solid rgba(91, 156, 246, 0.15);
    }

    #content pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.2rem 1.5rem;
      overflow-x: auto;
      margin: 1.2rem 0;
    }

    #content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.82rem;
      line-height: 1.75;
      color: #c9d8ed;
    }

    #content ul, #content ol {
      margin: 0.8rem 0;
      padding-left: 1.6rem;
    }

    #content li { margin: 0.45rem 0; }

    #content blockquote {
      border-left: 3px solid var(--purple);
      padding: 0.5rem 1rem;
      margin: 1.2rem 0;
      color: var(--muted);
      background: rgba(188, 140, 255, 0.04);
      border-radius: 0 6px 6px 0;
    }

    #content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.2rem 0;
      font-size: 0.9rem;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    #content th, #content td {
      border: 1px solid var(--border);
      padding: 10px 14px;
      text-align: left;
    }

    #content th {
      background: var(--surface);
      color: #fff;
      font-weight: 600;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    #content tr:nth-child(even) { background: rgba(255,255,255,0.015); }

    #content hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

    #content img { max-width: 100%; border-radius: 8px; }

    .mermaid { background: var(--surface); border-radius: 8px; padding: 1.2rem; margin: 1.2rem 0; border: 1px solid var(--border); }

    /* Feature boxes */
    #content .feature-box {
      background: linear-gradient(135deg, rgba(91,156,246,0.06) 0%, rgba(123,108,255,0.06) 100%);
      border: 1px solid rgba(91,156,246,0.2);
      border-radius: 8px;
      padding: 1.2rem 1.5rem;
      margin: 1.2rem 0;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--muted);
    }

    .loading::after {
      content: 'Loading...';
      animation: blink 1s infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Breadcrumb */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* Mobile */
    .mobile-toggle {
      display: none;
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 200;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .mobile-toggle { display: block; }
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.2s;
      }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .content-wrap { padding: 1.5rem 1.2rem; }
    }

    /* Search */
    .search-box {
      padding: 0 1.25rem;
      margin-bottom: 1rem;
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
  </style>
</head>
<body>

<button class="mobile-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰ Menu</button>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">🤖</div>
    <div>
      <div class="sidebar-brand">Lulu</div>
      <span class="sidebar-version">v0.0.7</span>
    </div>
  </div>

  <div class="search-box">
    <input class="search-input" type="text" placeholder="Search docs..." id="searchInput">
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-title">Getting Started</div>
    <a class="sidebar-link active" data-file="README.md" onclick="loadDoc('README.md')">
      <span class="icon">📖</span> README
    </a>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-title">Documentation</div>
    <a class="sidebar-link" data-file="docs/ARCHITECTURE.md" onclick="loadDoc('docs/ARCHITECTURE.md')">
      <span class="icon">🏗️</span> Architecture
    </a>
    <a class="sidebar-link" data-file="docs/ROADMAP.md" onclick="loadDoc('docs/ROADMAP.md')">
      <span class="icon">🗺️</span> Roadmap
    </a>
    <a class="sidebar-link" data-file="docs/DESKTOP.md" onclick="loadDoc('docs/DESKTOP.md')">
      <span class="icon">🖥️</span> Desktop
    </a>
    <a class="sidebar-link" data-file="docs/LSP-NEOVIM.md" onclick="loadDoc('docs/LSP-NEOVIM.md')">
      <span class="icon">💡</span> LSP Neovim
    </a>
    <a class="sidebar-link" data-file="docs/DECISIONS.md" onclick="loadDoc('docs/DECISIONS.md')">
      <span class="icon">📋</span> Decisions
    </a>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-title">Core Systems</div>
    <a class="sidebar-link" data-file="docs/ARCHITECTURE.md#gateway" onclick="loadDoc('docs/ARCHITECTURE.md')">
      <span class="icon">🌐</span> Gateway
    </a>
    <a class="sidebar-link" data-file="docs/ARCHITECTURE.md#skill-system" onclick="loadDoc('docs/ARCHITECTURE.md')">
      <span class="icon">🧠</span> Skill System
    </a>
    <a class="sidebar-link" data-file="docs/ARCHITECTURE.md#sub-agent-runtime" onclick="loadDoc('docs/ARCHITECTURE.md')">
      <span class="icon">🔱</span> Sub-Agents
    </a>
    <a class="sidebar-link" data-file="docs/ARCHITECTURE.md#knowledge-brain" onclick="loadDoc('docs/ARCHITECTURE.md')">
      <span class="icon">🧬</span> Knowledge Brain
    </a>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-title">API Reference</div>
    <a class="sidebar-link" data-file="docs/ARCHITECTURE.md" onclick="loadDoc('docs/ARCHITECTURE.md')">
      <span class="icon">⚡</span> Endpoints
    </a>
  </div>

  <div style="padding: 1.25rem; border-top: 1px solid var(--border); margin-top: 0.5rem;">
    <a href="https://github.com/JonusNattapong/lulu" target="_blank" class="sidebar-link">
      <span class="icon">🐙</span> GitHub
    </a>
    <a href="https://github.com/JonusNattapong/lulu/releases" target="_blank" class="sidebar-link">
      <span class="icon">📦</span> Releases
    </a>
  </div>
</aside>

<!-- Main -->
<main class="main">
  <div class="content-wrap">
    <div class="breadcrumb" id="breadcrumb">
      <span>📖</span> <span id="docTitle">README</span>
    </div>
    <div id="content">
      <div class="loading"></div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
const docs = [
  { name: 'README', file: 'README.md', icon: '📖', section: 'Getting Started' },
  { name: 'Architecture', file: 'docs/ARCHITECTURE.md', icon: '🏗️', section: 'Documentation' },
  { name: 'Roadmap', file: 'docs/ROADMAP.md', icon: '🗺️', section: 'Documentation' },
  { name: 'Desktop', file: 'docs/DESKTOP.md', icon: '🖥️', section: 'Documentation' },
  { name: 'LSP Neovim', file: 'docs/LSP-NEOVIM.md', icon: '💡', section: 'Documentation' },
  { name: 'Decisions', file: 'docs/DECISIONS.md', icon: '📋', section: 'Documentation' },
];

const docNames = {};
docs.forEach(d => docNames[d.file] = d.name);

mermaid.initialize({ startOnLoad: false, theme: 'dark', startMode: 'flatten' });

let currentFile = '';
let docCache = {};

async function loadDoc(file) {
  currentFile = file;
  document.getElementById('content').innerHTML = '<div class="loading"></div>';
  document.getElementById('sidebar').classList.remove('open');

  try {
    let text;
    if (docCache[file]) {
      text = docCache[file];
    } else {
      const res = await fetch(file + '?t=' + Date.now());
      if (!res.ok) throw new Error('Not found');
      text = await res.text();
      docCache[file] = text;
    }

    // Pre-process mermaid
    let html = text.replace(/```mermaid\n([\s\S]*?)```/g, (_, code) => {
      return `<div class="mermaid">${code.trim()}</div>`;
    });

    document.getElementById('content').innerHTML = marked.parse(html);
    document.getElementById('docTitle').textContent = docNames[file] || file;

    // Render mermaid
    try { mermaid.run({ nodes: document.querySelectorAll('.mermaid') }); } catch(e) {}

    // Update active
    document.querySelectorAll('.sidebar-link').forEach(link => {
      link.classList.toggle('active', link.dataset.file === file);
    });

    history.pushState({}, '', '#' + encodeURIComponent(file));
    window.scrollTo(0, 0);
  } catch (e) {
    document.getElementById('content').innerHTML = `
      <p style="color: #f85149; padding: 2rem;">⚠️ File not found: ${file}</p>`;
  }
}

// Search
document.getElementById('searchInput').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('.sidebar-link').forEach(link => {
    const text = link.textContent.toLowerCase();
    link.style.display = text.includes(q) ? '' : 'none';
  });
});

// Hash routing
if (location.hash) {
  loadDoc(decodeURIComponent(location.hash.slice(1)));
} else {
  loadDoc('README.md');
}

window.addEventListener('hashchange', () => {
  const file = decodeURIComponent(location.hash.slice(1));
  if (file && file !== currentFile) loadDoc(file);
});
</script>
</body>
</html>
